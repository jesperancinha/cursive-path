volumes:
  libretranslate_data:

services:
  libretranslate:
    image: libretranslate/libretranslate
    user: root
    ports:
      - "5000:5000"
    expose:
      - "5000"
    environment:
      - LT_DISABLE_WEB_UI=true
#      - LT_REQ_LIMIT=300
#      - LT_DEBUG=1
#      - LT_DISABLE_FILESYSTEM_LOADING=false
    volumes:
      - ./libretranslate_data:/home/libretranslate/.local/share/argos-translate
    stdin_open: true
    tty: true

  cursive-path-backend:
    build:
      context: backend/.
    ports:
      - "8000:8000"
    environment:
      - LT_URL=http://libretranslate:5000

  cursive-path-frontend:
    build:
      context: frontend/.
    ports:
      - "8080:80"
